<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Posts</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
<div class="container">
    <h1>📚 Blog Posts</h1>
    <div class="input-field">
        <input type="text" id="api-base-url" placeholder="Enter API Base URL" value="http://127.0.0.1:5002/api">
        <select id="get-sort" onchange="loadPosts()">
            <option value="id">Sort by ID</option>
            <option value="title">Sort by Title</option>
            <option value="content">Sort by Content</option>
            <option value="author">Sort by Author</option>
            <option value="date">Sort by Date</option>
            <option value="likes">Sort by Likes</option>
        </select>
        <select id="get-direction" onchange="loadPosts()">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
        </select>
        <button onclick="loadPosts()">Load Posts</button>
    </div>
    <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">
    <div class="input-field">
        <input type="text" id="post-title" placeholder="Enter Post Title (required)">
        <input type="text" id="post-content" placeholder="Enter Post Content (required)">
        <input type="text" id="post-author" placeholder="Enter your Name (optional)">
        <input type="text" id="post-date" placeholder="Enter Post Date (optional)">
        <button onclick="addPost()">Add Post</button>
    </div>
    <div id="post-container">
        <!-- Blog posts will be inserted here by JavaScript -->
    </div>
</div>

<script src="static/main.js"></script>
</body>
</html>
